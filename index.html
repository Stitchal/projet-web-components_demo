<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio — Lecteur Audio</title>

    <!--
      Composants autonomes.
      Remplacer les URLs ci-dessous par les URLs jsDelivr une fois repo-components poussé sur GitHub :
        https://cdn.jsdelivr.net/gh/TON-USER/REPO-COMPONENTS@main/components/audioplayer.js

      Attributs HTML disponibles :
        <my-audio-player src="URL/tracks.json" [autoplay]>
        <my-eq preset="-3,0,2,4,0,-2">
        <my-waveform color="#39e082" fft-size="1024" mode="waveform|spectrum">
        <my-butterchurn blend="2.0">
    -->
    <script type="module" src="../repo-components/components/audioplayer.js"></script>
    <script type="module" src="../repo-components/components/Playlist.js"></script>
    <script type="module" src="../repo-components/components/equalizer.js"></script>
    <script type="module" src="../repo-components/components/waveform.js"></script>
    <script type="module" src="../repo-components/components/butterchurn.js"></script>
    <script type="module" src="https://mainline.i3s.unice.fr/wam_wc/wam-host/wamHost.js"></script>
    <script type="module" src="https://mainline.i3s.unice.fr/wam_wc/wam-plugin/wamPlugin.js"></script>

    <!-- Câblage de la chaîne audio : player → eq → waveform → butterchurn → destination -->
    <script type="module" src="./studio.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { overflow: hidden; }
        #win-player   { width: 340px; height: 242px; }
        #win-playlist { width: 340px; height: 280px; }
        #win-eq       { width: 320px; }
        #win-waveform { width: 320px; }
        #win-butterchurn { height: 340px; }
        #win-wam      { width: 600px; }
    </style>
</head>

<body>
<main>
    <div class="window" id="win-player" data-no-resize>
        <div class="titlebar"><span class="titlebar-dot"></span>PLAYER</div>
        <my-audio-player id="player" src="./assets/tracks.json"></my-audio-player>
    </div>
    <div class="window" id="win-playlist">
        <div class="titlebar"><span class="titlebar-dot"></span>PLAYLIST</div>
        <my-playlist id="playlist"></my-playlist>
    </div>
    <div class="window" id="win-eq" data-no-resize>
        <div class="titlebar"><span class="titlebar-dot"></span>EQUALIZER</div>
        <my-eq id="eq" preset="0,0,0,0,0,0"></my-eq>
    </div>
    <div class="window" id="win-waveform">
        <div class="titlebar"><span class="titlebar-dot"></span>WAVEFORM</div>
        <my-waveform id="waveform" color="#39e082" fft-size="1024"></my-waveform>
    </div>
    <div class="window" id="win-butterchurn">
        <div class="titlebar"><span class="titlebar-dot"></span>VISUALIZER</div>
        <my-butterchurn id="butterchurn"></my-butterchurn>
    </div>
    <div class="window" id="win-wam" data-resize="x">
        <div class="titlebar">
            <span class="titlebar-dot"></span>PIANO
            <label class="wam-volume-label">
                VOL
                <input type="range" id="wam-volume" min="0" max="6" step="0.01" value="3">
                <span id="wam-volume-display">100%</span>
            </label>
        </div>
        <div class="wam-container">
            <wam-host>
                <wam-plugin src="https://www.webaudiomodules.com/community/plugins/burns-audio/soundfont/index.js"></wam-plugin>
            </wam-host>
        </div>
    </div>
</main>
</body>

</html>
